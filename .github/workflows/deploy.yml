name: Shiny Deployment Note

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deployment-note:
    runs-on: ubuntu-latest
    steps:
      - name: Explain deployment change
        run: |
          echo "The active implementation in this repository is now an R Shiny app."
          echo "GitHub Pages deployment has been retired because Pages cannot host a running Shiny process."
          echo "Use a Shiny-capable host such as shinyapps.io, Posit Connect, or a container-based R runtime."
